<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>José Manuel Velazco Ochoa — Ingeniero Topógrafo Geomático</title>
<meta name="description" content="Portafolio de José Manuel Velazco Ochoa, Ingeniero Topógrafo Geomático. GIS, cartografía temática, geodesia, teledetección y análisis espacial.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A1220;
    --bg-alt:#0F1A2C;
    --surface:#101C30;
    --text:#F2F5FA;
    --text-dim:#93A2BC;
    --border:#233047;
    --accent:#5B8DEF;
    --accent-2:#7FA4F5;
    --accent-soft:rgba(91,141,239,0.16);
    --shadow:0 20px 40px -20px rgba(0,0,0,0.6);
    --display:'Space Grotesk',sans-serif;
    --body:'Inter',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  html[data-theme="light"]{
    --bg:#F6F8FC;
    --bg-alt:#EDF1F8;
    --surface:#FFFFFF;
    --text:#141A26;
    --text-dim:#5B6577;
    --border:#E1E6EF;
    --accent:#3563E9;
    --accent-2:#4F7CF0;
    --accent-soft:rgba(53,99,233,0.10);
    --shadow:0 20px 40px -24px rgba(20,26,38,0.18);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--body);
    line-height:1.6;font-size:16px;transition:background .4s ease,color .4s ease;
    overflow-x:hidden;
  }
  a{color:inherit;}
  ::selection{background:var(--accent);color:#fff;}
  :focus-visible{outline:2px solid var(--accent-2);outline-offset:3px;}
  button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;}
  h1,h2,h3{font-family:var(--display);}

  /* ================= TILT PHOTO ================= */
  .cube-scene{
    width:var(--s);height:var(--s);
    perspective:calc(var(--s) * 4);
    margin:0 auto;
  }
  .cube{
    width:100%;height:100%;position:relative;
    transform-style:preserve-3d;
    transform:rotateX(0deg) rotateY(0deg);
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
    border-radius:14px;
    box-shadow:var(--shadow);
  }
  .cube .face{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;border-radius:14px;
    background:var(--accent-soft);
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }
  .face-front img{width:100%;height:100%;object-fit:cover;}
  .face-front .fallback{
    display:none;width:60%;height:60%;align-items:center;justify-content:center;
  }
  .face-front .fallback svg{width:100%;height:100%;stroke:var(--accent);fill:none;stroke-width:1.4;}

  /* reflejo que sigue al mouse/tilt */
  .face .shine{
    position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(115deg, transparent 32%, rgba(255,255,255,.6) 49%, transparent 66%);
    background-size:240% 240%;
    background-position:var(--mx,50%) var(--my,50%);
    mix-blend-mode:overlay;
    opacity:0;
    transition:opacity .35s ease;
  }
  .cube-scene:hover .shine{opacity:1;}

  /* cara trasera: QR de LinkedIn */
  .face-back{
    background:#fff;
    transform:rotateY(180deg);
    flex-direction:column;gap:6px;
  }
  .face-back img{width:78%;height:78%;object-fit:contain;}

  /* ================= SPLASH ================= */
  .splash{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
    background:var(--bg);cursor:pointer;
    transition:opacity .6s ease, visibility .6s ease;
  }
  .splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
  .splash-text{
    font-family:var(--display);font-weight:700;font-size:clamp(1.6rem,4vw,2.4rem);
    letter-spacing:-0.01em;
  }
  .splash-hint{
    font-family:var(--mono);font-size:11px;color:var(--text-dim);
    letter-spacing:.1em;text-transform:uppercase;
    opacity:.8;
  }

  /* ================= APP LAYOUT ================= */
  .app{display:flex;min-height:100vh;}
  .sidebar{
    width:280px;flex-shrink:0;
    background:var(--bg-alt);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    justify-content:space-between;
    padding:40px 26px;
    position:sticky;top:0;height:100vh;
  }
  .side-top{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;}
  .side-name{font-family:var(--display);font-weight:600;font-size:17px;line-height:1.25;}
  .side-role{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.04em;}

  .side-nav{display:flex;flex-direction:column;gap:8px;margin-top:36px;}
  .nav-btn{
    text-align:left;padding:13px 16px;border-radius:10px;
    font-size:14px;font-weight:500;color:var(--text-dim);
    border:1px solid transparent;
    transition:transform .25s ease, background .25s ease, color .25s ease, border-color .25s ease;
  }
  .nav-btn:hover{
    transform:translateX(4px) scale(1.03);
    background:var(--surface);
    color:var(--text);
    border-color:var(--border);
  }
  .nav-btn.active{
    background:var(--accent-soft);
    color:var(--accent);
    border-color:var(--accent-soft);
    font-weight:600;
  }

  .side-bottom{display:flex;flex-direction:column;gap:14px;align-items:center;}

  .theme-switch{
    display:flex;gap:4px;padding:4px;
    border:1px solid var(--border);border-radius:22px;background:var(--surface);
  }
  .theme-opt{
    display:flex;align-items:center;gap:7px;
    padding:8px 14px;border-radius:18px;
    font-family:var(--mono);font-size:11.5px;color:var(--text-dim);
    transition:background .2s ease,color .2s ease;
  }
  .theme-opt svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}
  .theme-opt:hover{color:var(--accent);}
  .theme-opt.active{background:var(--accent);color:#fff;}

  .toast{
    position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px);
    background:var(--surface);color:var(--text);border:1px solid var(--border);
    font-family:var(--mono);font-size:10.5px;white-space:nowrap;
    padding:5px 10px;border-radius:8px;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
    z-index:5;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ================= LISTÓN DORADO DE LINKEDIN ================= */
  .li-strip{
    position:fixed;top:0;left:0;z-index:150;
    max-width:min(210px, calc(100vw - 32px));
    opacity:0;transform:scale(.9) translateX(-6px);
    transform-origin:left center;
    transition:opacity .35s ease, transform .35s ease;
    pointer-events:none;
    filter:drop-shadow(0 8px 16px rgba(120,84,10,.35));
  }
  .li-strip.open{
    opacity:1;transform:scale(1) translateX(0);
    pointer-events:auto;
  }

  .li-ribbon{
    display:flex;align-items:center;gap:10px;
    height:46px;padding:0 22px 0 16px;
    color:#4A3208;white-space:nowrap;
    text-decoration:none;
    background:#D4AF37;
    border-radius:8px;
    transition:background .2s ease;
  }
  .li-ribbon:hover{background:#C8A02F;}

  .li-strip-icon{flex-shrink:0;width:22px;height:22px;}
  .li-strip-icon svg{width:100%;height:100%;display:block;}
  .li-strip-text{
    font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.01em;
  }


  /* ================= CONTENT ================= */
  .content{flex:1;padding:64px 72px 100px;max-width:none;width:100%;}
  .panel{display:none;}
  .panel.active{display:block;animation:fadeIn .5s ease forwards;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .eyebrow{
    font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:'';width:22px;height:1px;background:var(--accent);}
  .panel h2{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;letter-spacing:-0.01em;margin-bottom:22px;}
  .panel > p.lead{color:var(--text-dim);font-size:16px;max-width:none;width:100%;margin-bottom:32px;text-align:justify;hyphens:auto;box-sizing:border-box;}

  .badges{display:flex;flex-wrap:wrap;gap:9px;margin:26px 0;}
  .badge{
    font-family:var(--mono);font-size:11.5px;padding:7px 12px;border-radius:20px;
    border:1px solid var(--border);color:var(--text-dim);background:var(--surface);
  }

  .quick-card{
    border:1px solid var(--border);border-radius:14px;padding:24px;background:var(--surface);
    box-shadow:var(--shadow);margin-top:24px;
  }
  .quick-card dl{display:grid;grid-template-columns:auto 1fr;gap:10px 18px;font-size:13.5px;}
  .quick-card dt{font-family:var(--mono);color:var(--text-dim);text-transform:uppercase;font-size:11px;letter-spacing:.05em;padding-top:2px;}

  .lang-block{margin-top:34px;}
  .lang-title{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;}
  .lang-row{display:flex;align-items:center;gap:16px;margin-bottom:12px;font-family:var(--mono);font-size:13px;}
  .lang-name{width:100px;}
  .signal{display:flex;gap:4px;align-items:flex-end;}
  .signal span{width:6px;background:var(--border);border-radius:1px;}
  .signal span:nth-child(1){height:10px;}
  .signal span:nth-child(2){height:14px;}
  .signal span:nth-child(3){height:18px;}
  .signal span:nth-child(4){height:22px;}
  .signal span.on{background:var(--accent);}
  .lang-level{color:var(--text-dim);font-size:11.5px;}

  /* educacion */
  .edu-card{border:1px solid var(--border);border-radius:14px;padding:36px;background:var(--surface);box-shadow:var(--shadow);}
  .edu-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:14px;}
  .edu-degree{font-family:var(--display);font-weight:700;font-size:19px;}
  .edu-school{color:var(--accent);font-family:var(--mono);font-size:12.5px;margin-top:4px;}
  .edu-years{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);}
  .edu-meta{display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .edu-card p{color:var(--text-dim);font-size:14.5px;max-width:100ch;text-align:justify;hyphens:auto;}
  .cedula{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:14px;}

  .verify-btn{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:#fff;background:#1FA663;border:1px solid #1FA663;border-radius:20px;
    padding:9px 16px;white-space:nowrap;
    transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
    box-shadow:0 8px 18px -8px rgba(31,166,99,0.55);
  }
  .verify-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
  .verify-btn:hover{background:#188F55;transform:translateY(-1px);box-shadow:0 10px 22px -8px rgba(31,166,99,0.65);}
  .verify-btn:active{transform:translateY(0);}

  /* experiencia */
  .timeline{position:relative;padding-left:30px;margin-top:8px;}
  .timeline::before{content:'';position:absolute;left:4px;top:6px;bottom:6px;width:1px;background:var(--border);}
  .station{position:relative;padding-bottom:44px;}
  .station:last-child{padding-bottom:0;}
  .station::before{content:'';position:absolute;left:-30px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--bg);border:2px solid var(--accent);}
  .station-code{font-family:var(--mono);font-size:10.5px;color:var(--accent);letter-spacing:.06em;margin-bottom:4px;}
  .station-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
  .station-role{font-family:var(--display);font-weight:600;font-size:17px;}
  .station-org{font-family:var(--mono);font-size:12.5px;color:var(--text-dim);}
  .station ul{list-style:none;color:var(--text-dim);font-size:14px;max-width:100ch;margin-top:8px;text-align:justify;hyphens:auto;}
  .station ul li{position:relative;padding-left:16px;margin-bottom:5px;}
  .station ul li::before{content:'—';position:absolute;left:0;color:var(--border);}

  /* certificados */
  .cert-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px,1fr));gap:0 34px;}
  .cert-row{display:flex;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .cert-meta{font-family:var(--mono);font-size:10.5px;color:var(--text-dim);white-space:nowrap;text-align:right;}
  .award-box{margin-top:36px;border-left:3px solid var(--accent);padding:18px 24px;background:var(--surface);border-radius:0 12px 12px 0;}
  .award-box .tag{font-family:var(--mono);font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px;}
  .award-box p{color:var(--text-dim);font-size:13.5px;max-width:100ch;text-align:justify;hyphens:auto;}

  /* habilidades */
  .skills-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px,1fr));gap:20px;}
  .skill-card{border:1px solid var(--border);border-radius:14px;padding:26px;background:var(--surface);box-shadow:var(--shadow);}
  .skill-card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .skill-icon{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .skill-icon svg{width:19px;height:19px;stroke:var(--accent);fill:none;stroke-width:1.6;}
  .skill-card h3{font-size:15px;font-weight:600;}
  .skill-card ul{list-style:none;color:var(--text-dim);font-size:13.5px;}
  .skill-card ul li{position:relative;padding-left:16px;margin-bottom:9px;text-align:justify;hyphens:auto;}
  .skill-card ul li::before{content:'—';position:absolute;left:0;color:var(--border);}
  .skill-card ul li:last-child{margin-bottom:0;}
  .soft-title{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin:40px 0 16px;display:flex;align-items:center;gap:10px;}
  .soft-title::before{content:'';width:22px;height:1px;background:var(--accent);}
  .soft-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(220px,1fr));gap:14px;}
  .soft-card{border:1px solid var(--border);border-radius:12px;padding:17px 19px;background:var(--bg-alt);}
  .soft-card strong{display:block;font-family:var(--display);font-size:13.5px;margin-bottom:6px;}
  .soft-card span{font-size:12.5px;color:var(--text-dim);text-align:justify;hyphens:auto;display:block;}

  /* portafolio */
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px,1fr));gap:20px;}
  .proj-card{
    border:1px solid var(--border);border-radius:14px;padding:24px;background:var(--surface);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .proj-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);}
  .proj-tag{font-family:var(--mono);font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:block;}
  .proj-card h3{font-size:16px;font-weight:600;margin-bottom:8px;}
  .proj-card p{font-size:13.5px;color:var(--text-dim);text-align:justify;hyphens:auto;}
  .proj-metrics{display:flex;gap:14px;margin-top:14px;font-family:var(--mono);font-size:10.5px;color:var(--text-dim);}

  footer{
    font-family:var(--mono);font-size:11.5px;color:var(--text-dim);
    padding:34px 64px;border-top:1px solid var(--border);
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px 24px;
  }
  .footer-brand{display:flex;align-items:center;gap:9px;min-width:0;}
  .footer-brand svg{width:16px;height:16px;fill:currentColor;flex-shrink:0;}
  .footer-copy{white-space:nowrap;}
  .footer-links{display:flex;flex-wrap:wrap;gap:10px;}
  .footer-chip{
    position:relative;
    display:flex;align-items:center;gap:7px;max-width:100%;
    padding:7px 13px;border:1px solid var(--border);border-radius:20px;
    font-family:var(--mono);font-size:11.5px;color:var(--text-dim);
    transition:border-color .2s ease, color .2s ease, background .2s ease;
  }
  .footer-chip:hover{border-color:var(--accent-2);color:var(--accent);background:var(--accent-soft);}
  .footer-chip svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0;}
  .footer-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* mobile layout */
  @media (max-width:860px){
    .app{flex-direction:column;}
    .sidebar{
      width:100%;height:auto;position:sticky;top:0;z-index:20;
      flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:space-between;
      padding:18px 20px;
    }
    .side-top{flex-direction:row;text-align:left;gap:12px;}
    .side-nav{
      flex-direction:row;flex-wrap:wrap;margin-top:0;gap:6px;
      order:3;width:100%;margin-top:14px;
    }
    .nav-btn{padding:9px 12px;font-size:12.5px;}
    .side-bottom{flex-direction:row;order:2;}
    .theme-opt{padding:7px 11px;font-size:11px;}
    .content{padding:44px 24px 80px;}
    footer{padding:26px 24px;flex-direction:column;align-items:flex-start;gap:16px;}
    .footer-links{width:100%;}
    .footer-chip{flex:1 1 auto;}
    .footer-chip span{max-width:52vw;}
    .li-ribbon{height:42px;padding:0 20px 0 14px;gap:8px;}
    .li-strip-text{font-size:13px;}
  }
</style>
</head>
<body>

<!-- ===== SPLASH ===== -->
<div class="splash" id="splash" tabindex="0" role="button" aria-label="Tocar para continuar">
  <div class="cube-scene" id="splashScene" style="--s:170px">
    <div class="cube" id="splashCube">
      <div class="face face-front">
        <img class="js-photo" alt="Foto de perfil" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="fallback">
          <svg viewBox="0 0 100 100"><circle cx="50" cy="35" r="16"/><path d="M20 88 C20 62 34 52 50 52 C66 52 80 62 80 88"/></svg>
        </div>
        <div class="shine"></div>
      </div>
    </div>
  </div>
  <div class="splash-text">Bienvenido</div>
  <div class="splash-hint">Toca para continuar</div>
</div>

<!-- ===== APP ===== -->
<div class="app">
  <aside class="sidebar">
    <div class="side-top">
      <div class="cube-scene" id="sideScene" style="--s:92px">
        <div class="cube" id="sideCube">
          <div class="face face-front">
            <img class="js-photo" alt="Foto de perfil" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="fallback">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="35" r="16"/><path d="M20 88 C20 62 34 52 50 52 C66 52 80 62 80 88"/></svg>
            </div>
            <div class="shine"></div>
          </div>
          <div class="face face-back">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data=https%3A%2F%2Fwww.linkedin.com%2Fin%2Fjosemanuelvelazcoochoa%2F" alt="Código QR del perfil de LinkedIn">
            <div class="shine"></div>
          </div>
        </div>
      </div>
      <div>
        <div class="side-name" id="sideName">…</div>
        <div class="side-role" id="sideRole">…</div>
      </div>
    </div>

    <nav class="side-nav">
      <button class="nav-btn active" data-target="acerca">Acerca de mí</button>
      <button class="nav-btn" data-target="educacion">Educación</button>
      <button class="nav-btn" data-target="experiencia">Experiencia</button>
      <button class="nav-btn" data-target="habilidades">Habilidades</button>
      <button class="nav-btn" data-target="certificados">Certificados</button>
      <button class="nav-btn" data-target="portafolio">Portafolio</button>
    </nav>

    <div class="side-bottom">
      <div class="theme-switch" id="themeSwitch" role="group" aria-label="Tema de la página">
        <button type="button" class="theme-opt" data-theme-value="light" aria-pressed="false">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>
          Claro
        </button>

<script src="render.js"></script>
<script>
  // ---------- Splash ----------
  const splash = document.getElementById('splash');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function hideSplash(){
    splash.classList.add('hide');
  }
  splash.addEventListener('click', hideSplash);
  splash.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); hideSplash(); }
  });

  // ---------- Cube tilt (+ reflejo que sigue al mouse) ----------
  // Cada cubo tiene un "state" mutable: permite que el giro (flip) del QR
  // conviva con el tilt normal, cambiando simplemente baseY a 180.
  function attachTilt(sceneEl, cubeEl, state){
    if(reducedMotion){
      cubeEl.style.transform = `rotateX(${state.baseX}deg) rotateY(${state.baseY}deg)`;
      return;
    }
    sceneEl.addEventListener('mousemove', (e)=>{
      const rect = sceneEl.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width - 0.5;
      const py = (e.clientY - rect.top) / rect.height - 0.5;
      cubeEl.style.transform = `rotateX(${state.baseX - py*state.range}deg) rotateY(${state.baseY + px*state.range}deg)`;
      cubeEl.style.setProperty('--mx', `${(px + 0.5) * 100}%`);
      cubeEl.style.setProperty('--my', `${(py + 0.5) * 100}%`);
    });
    sceneEl.addEventListener('mouseleave', ()=>{
      cubeEl.style.transform = `rotateX(${state.baseX}deg) rotateY(${state.baseY}deg)`;
    });
  }
  const splashState = { baseX:0, baseY:0, range:18 };
  const sideState = { baseX:0, baseY:0, range:22 };
  attachTilt(document.getElementById('splashScene'), document.getElementById('splashCube'), splashState);
  attachTilt(document.getElementById('sideScene'), document.getElementById('sideCube'), sideState);

  // ---------- Navigation ----------
  const buttons = document.querySelectorAll('.nav-btn');
  const panels = document.querySelectorAll('.panel');
  buttons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      buttons.forEach(b=>b.classList.remove('active'));
      panels.forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.target).classList.add('active');
    });
  });

  // ---------- Foto lateral: clic = gira y muestra QR + tira de LinkedIn ----------
  const sideScene = document.getElementById('sideScene');
  const sideCube = document.getElementById('sideCube');
  const liStrip = document.getElementById('liStrip');
  const FLIP_MS = 500; // debe coincidir con la transición de .cube en el CSS
  let flipped = false;

  sideScene.style.cursor = 'pointer';
  sideScene.setAttribute('role', 'button');
  sideScene.setAttribute('tabindex', '0');
  sideScene.setAttribute('aria-label', 'Girar foto para ver el código QR de LinkedIn');

  function positionStrip(){
    const rect = sideScene.getBoundingClientRect();
    const isMobile = window.matchMedia('(max-width:860px)').matches;
    if(isMobile){
      liStrip.style.top = `${rect.bottom + 10}px`;
      liStrip.style.left = `16px`;
    }else{
      liStrip.style.top = `${rect.top + rect.height / 2 - 23}px`;
      liStrip.style.left = `${rect.right + 14}px`;
    }
  }

  function toggleFlip(){
    flipped = !flipped;
    sideState.baseY = flipped ? 180 : 0;
    sideCube.style.transform = `rotateX(${sideState.baseX}deg) rotateY(${sideState.baseY}deg)`;

    if(flipped){
      positionStrip();
      setTimeout(()=>{ if(flipped) liStrip.classList.add('open'); }, reducedMotion ? 0 : FLIP_MS);
    }else{
      liStrip.classList.remove('open');
    }
  }

  sideScene.addEventListener('click', toggleFlip);
  sideScene.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggleFlip(); }
  });
  window.addEventListener('resize', ()=>{ if(flipped) positionStrip(); });

  // ---------- Theme toggle (Claro / Oscuro, siempre inicia en Oscuro) ----------
  const themeOpts = document.querySelectorAll('.theme-opt');

  function applyTheme(pref){
    document.documentElement.setAttribute('data-theme', pref);
    themeOpts.forEach(btn=>{
      const active = btn.dataset.themeValue === pref;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }
  applyTheme('dark'); // el sitio siempre arranca en oscuro; el usuario puede cambiarlo con un clic

  themeOpts.forEach(btn=>{
    btn.addEventListener('click', ()=> applyTheme(btn.dataset.themeValue));
  });

  // ---------- Footer: copiar correo / copiar+abrir WhatsApp ----------
  function showToast(toastEl){
    toastEl.classList.add('show');
    clearTimeout(toastEl._hideTimer);
    toastEl._hideTimer = setTimeout(()=> toastEl.classList.remove('show'), 1800);
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch(e){
      try{
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        return true;
      }catch(e2){ return false; }
    }
  }

  const footerEmailBtn = document.getElementById('footerEmail');
  const footerEmailToast = document.getElementById('footerEmailToast');
  if(footerEmailBtn){
    footerEmailBtn.addEventListener('click', async ()=>{
      const value = footerEmailBtn.dataset.copy || document.getElementById('footerEmailText').textContent;
      await copyText(value);
      showToast(footerEmailToast);
    });
  }

  const footerPhoneBtn = document.getElementById('footerPhone');
  const footerPhoneToast = document.getElementById('footerPhoneToast');
  if(footerPhoneBtn){
    footerPhoneBtn.addEventListener('click', async ()=>{
      const display = footerPhoneBtn.dataset.copy || document.getElementById('footerPhoneText').textContent;
      const digits = (footerPhoneBtn.dataset.wa || display).replace(/[^\d]/g, '');
      await copyText(display);
      showToast(footerPhoneToast);
      setTimeout(()=>{ window.open(`https://wa.me/${digits}`, '_blank', 'noopener'); }, 450);
    });
  }
</script>
